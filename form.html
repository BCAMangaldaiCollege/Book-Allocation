<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Allocation Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4efe8;
      --surface: rgba(255, 251, 245, 0.92);
      --surface-alt: rgba(255, 255, 255, 0.7);
      --text: #1d2433;
      --muted: #6b7280;
      --line: rgba(97, 75, 46, 0.12);
      --accent: #bc6c25;
      --accent-deep: #9b5719;
      --shadow: 0 28px 70px rgba(64, 44, 16, 0.14);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(188, 108, 37, 0.2), transparent 28%),
        radial-gradient(circle at bottom left, rgba(96, 108, 56, 0.14), transparent 24%),
        linear-gradient(180deg, #f8f2ea 0%, #eee4d7 100%);
      padding: 24px 16px 48px;
    }

    .shell {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(146, 108, 59, 0.16);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 28px 28px 24px;
      background: linear-gradient(135deg, rgba(255, 248, 236, 0.94), rgba(249, 240, 228, 0.82));
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(188, 108, 37, 0.1);
      color: var(--accent-deep);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .hero-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 680px;
    }

    .summary {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      padding: 18px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(146, 108, 59, 0.12);
    }

    .summary-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .summary-value {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      line-height: 1.4;
    }

    .form-wrap {
      padding: 28px;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .member-grid {
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    .member-card {
      padding: 18px;
      border-radius: var(--radius-lg);
      background: var(--surface-alt);
      border: 1px solid rgba(146, 108, 59, 0.12);
    }

    .member-title {
      margin: 0 0 14px;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--accent-deep);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(113, 86, 51, 0.18);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus {
      border-color: rgba(188, 108, 37, 0.55);
      box-shadow: 0 0 0 4px rgba(188, 108, 37, 0.12);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 28px;
    }

    .btn {
      padding: 14px 20px;
      border-radius: 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-secondary {
      border: 1px solid rgba(113, 86, 51, 0.18);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
    }

    .btn-primary {
      border: none;
      background: linear-gradient(135deg, var(--accent), #d88940);
      color: #fff9f2;
      box-shadow: 0 16px 34px rgba(188, 108, 37, 0.24);
    }

    @media (max-width: 720px) {
      .summary,
      .field-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .form-wrap {
        padding: 22px 18px;
      }

      .actions {
        flex-direction: column-reverse;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card">
      <div class="hero">
        <span class="eyebrow">Student Form</span>
        <h1>Fill Your Details</h1>
        <p class="hero-copy">
          Complete the student allocation form carefully. The selected book and team size are shown below for quick verification.
        </p>

        <div class="summary">
          <article class="summary-card">
            <p class="summary-label">Selected Book</p>
            <p class="summary-value" id="selectedBook">Not selected</p>
          </article>
          <article class="summary-card">
            <p class="summary-label">Team Size</p>
            <p class="summary-value" id="selectedGroup">0 students</p>
          </article>
        </div>
      </div>

      <div class="form-wrap">
        <h2 class="section-title">Primary Student</h2>
        <div class="field-grid">
          <div class="field">
            <label for="name">Student Name</label>
            <input id="name" placeholder="Enter full name">
          </div>
          <div class="field">
            <label for="roll">Roll Number</label>
            <input id="roll" placeholder="Enter roll number">
          </div>
        </div>

        <div id="team" class="member-grid"></div>

        <div class="actions">
          <button class="btn btn-secondary" type="button" onclick="goBack()">Back to Dashboard</button>
          <button class="btn btn-primary" type="button" onclick="submitData()">Submit Allocation</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="../form.js"></script>
</body>
</html>
